<body>
    <h1> This is Anonymous Function file </h1>
    <script>
        const add = function (a, b) {
            return a + b;
        }
   
          const sub  = function (a, b) {
            return a - b;
        }
        function operation(fun) {
            let x = 10;
            let y = 20;
            console.log(fun(x, y));
        }

        operation(add);
        operation(sub);

        const onTime = function(){
            console.log("on time called");
            
        }
        setTimeout(onTime, 2000);

        //  setTimeout(function(){

        // }, 2000);
    </script>
